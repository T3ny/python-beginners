<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            margin-top: 80px;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 15px;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background-color: #2c3e50;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #1a242f;
        }

        .chat-log {
            margin-top: 30px;
            padding: 20px;
            background-color: #f1f1f1;
            border-radius: 6px;
        }

        .chat-log p {
            margin: 10px 0;
            font-size: 15px;
        }

        .chat-log strong {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BOT CHAT</h1>
        <form method="POST" action="/ask">
            <label for="" style = 'color: #2c3e50'>USER</label><br>
            <input type="text" name="user_input" placeholder="Ask me anything..." required>
            <button type="submit">Send</button>
        </form>

        {% if user_input %}
        <div class="chat-log">
            <p><strong>You:</strong> {{ user_input }}</p>
            <p><strong>Bot:</strong> {{ response }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
